<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pionner - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>PIONNER</h1>
            <p class="subtitle">Gestión de Cafetería</p>
        </header>

        <section class="role-section" id="roleSection">
            <h2>Seleccione su nombre</h2>
            <div class="roles-grid">
                <button class="btn-role" data-user="yoandri">Yoandri</button>
                <button class="btn-role" data-user="dairan">Dairan</button>
                <button class="btn-role" data-user="mariadelcarmen">Maria Del Carmen</button>
                <button class="btn-role" data-user="marikarla">Marikarla</button>
            </div>
        </section>

        <section class="auth-section" id="authSection">
            <h3 id="authTitle">Acceso</h3>
            <p style="margin-bottom: 15px; color: var(--text-light); font-size: 0.9rem;">Ingrese su PIN de seguridad</p>
            <div class="form-group">
                <input type="password" id="userPin" maxlength="4" inputmode="numeric" placeholder="••••">
            </div>
            <div class="auth-actions">
                <button class="btn-secondary" id="btnBack">Volver</button>
                <button class="btn-primary" id="btnSubmit">Entrar</button>
            </div>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
